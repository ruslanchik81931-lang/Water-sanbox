<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Реалистичная Физика Воды</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            color: #fff;
            font-family: sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 8px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h3>Управление:</h3>
        <p>ЛКМ — Налить воду</p>
        <p>ПКМ — Убрать воду</p>
        <p>Частиц: <span id="count">0</span></p>
    </div>
    <canvas id="sim"></canvas>

<script>
    const canvas = document.getElementById('sim');
    const ctx = canvas.getContext('2d', { alpha: false });
    const countSpan = document.getElementById('count');

    // Настройки симуляции
    const SCALE = 4; // Размер клетки в пикселях
    let cols, rows;
    
    // Две сетки: текущая и следующая для двойной буферизации
    let grid;
    let nextGrid;
    
    const WATER_COLOR = [30, 144, 255];
    
    let isMouseDown = false;
    let isRightClick = false;
    let mouseX = 0;
    let mouseY = 0;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        cols = Math.ceil(canvas.width / SCALE);
        rows = Math.ceil(canvas.height / SCALE);
        
        // Создаем новые массивы при изменении размера
        grid = new Uint8Array(cols * rows);
        nextGrid = new Uint8Array(cols * rows);
        
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    window.addEventListener('resize', resize);
    resize();

    canvas.addEventListener('mousedown', e => {
        if (e.button === 0) isMouseDown = true;
        if (e.button === 2) isRightClick = true;
        updateMouse(e);
    });
    
    window.addEventListener('mouseup', () => {
        isMouseDown = false;
        isRightClick = false;
    });
    
    canvas.addEventListener('contextmenu', e => e.preventDefault());
    
    canvas.addEventListener('mousemove', e => {
        updateMouse(e);
    });

    function updateMouse(e) {
        const rect = canvas.getBoundingClientRect();
        mouseX = Math.floor((e.clientX - rect.left) / SCALE);
        mouseY = Math.floor((e.clientY - rect.top) / SCALE);
    }

    function update() {
        // 1. Обработка ввода (добавление/удаление воды)
        const brushSize = 3;
        if (isMouseDown || isRightClick) {
            for (let y = -brushSize; y <= brushSize; y++) {
                for (let x = -brushSize; x <= brushSize; x++) {
                    if (x*x + y*y <= brushSize*brushSize) {
                        const cx = mouseX + x;
                        const cy = mouseY + y;
                        if (cx >= 0 && cx < cols && cy >= 0 && cy < rows) {
                            const idx = cy * cols + cx;
                            if (isRightClick) {
                                grid[idx] = 0; // Удаляем воду
                            } else {
                                // Добавляем воду (с небольшим разбросом для естественности)
                                if (Math.random() > 0.1) grid[idx] = 1;
                            }
                        }
                    }
                }
            }
        }

        // 2. Симуляция физики воды
        // Ключевые моменты для правильной работы:
        // - Обрабатываем сетку СНИЗУ ВВЕРХ (от rows-1 до 0), чтобы вода падала корректно
        // - Используем двойной буфер (nextGrid), чтобы изменения в текущем кадре не влияли на другие частицы в этом же кадре
        // - Чередование направления сканирования по X предотвращает смещение воды в одну сторону
        
        const frame = Date.now();
        const direction = (frame % 2000 < 1000) ? 1 : -1; // Меняем направление каждые полсекунды
        
        let activeParticles = 0;
        
        // Очищаем следующую сетку
        nextGrid.fill(0);

        // Проходим по всем ячейкам снизу вверх
        for (let y = rows - 1; y >= 0; y--) {
            // Определяем порядок обхода по X (слева-направо или справа-налево)
            const startX = (direction === 1) ? 0 : cols - 1;
            const stepX = direction;

            for (let i = 0; i < cols; i++) {
                const x = startX + (i * stepX);
                const idx = y * cols + x;
                
                // Если в этой ячейке есть вода
                if (grid[idx] === 1) {
                    activeParticles++;
                    let moved = false;

                    // ПРИОРИТЕТ 1: Падение вниз
                    if (y + 1 < rows) {
                        const belowIdx = (y + 1) * cols + x;
                        // Проверяем, что внизу пусто и в следующей сетке туда еще ничего не записали
                        if (grid[belowIdx] === 0 && nextGrid[belowIdx] === 0) {
                            nextGrid[belowIdx] = 1;
                            moved = true;
                        }
                    }

                    // ПРИОРИТЕТ 2: Скатывание по диагонали (вниз-влево или вниз-вправо)
                    if (!moved) {
                        // Случайный выбор направления для естественности
                        const dirOffset = (Math.random() < 0.5) ? -1 : 1;
                        const check1 = x + dirOffset;
                        const check2 = x - dirOffset;

                        if (y + 1 < rows) {
                            // Пробуем первое направление
                            if (check1 >= 0 && check1 < cols) {
                                const diag1 = (y + 1) * cols + check1;
                                if (grid[diag1] === 0 && nextGrid[diag1] === 0) {
                                    nextGrid[diag1] = 1;
                                    moved = true;
                                }
                            }
                            
                            // Если не получилось, пробуем второе направление
                            if (!moved && check2 >= 0 && check2 < cols) {
                                const diag2 = (y + 1) * cols + check2;
                                if (grid[diag2] === 0 && nextGrid[diag2] === 0) {
                                    nextGrid[diag2] = 1;
                                    moved = true;
                                }
                            }
                        }
                    }

                    // ПРИОРИТЕТ 3: Растекание в стороны (если внизу препятствие)
                    if (!moved) {
                        const sideOffset = (Math.random() < 0.5) ? -1 : 1;
                        const s1 = x + sideOffset;
                        const s2 = x - sideOffset;

                        // Пробуем первое направление
                        if (s1 >= 0 && s1 < cols) {
                            const side1 = y * cols + s1;
                            if (grid[side1] === 0 && nextGrid[side1] === 0) {
                                nextGrid[side1] = 1;
                                moved = true;
                            }
                        }
                        
                        // Если не получилось, пробуем второе направление
                        if (!moved && s2 >= 0 && s2 < cols) {
                            const side2 = y * cols + s2;
                            if (grid[side2] === 0 && nextGrid[side2] === 0) {
                                nextGrid[side2] = 1;
                                moved = true;
                            }
                        }
                    }

                    // Если никуда не переместились, вода остается на месте
                    if (!moved) {
                        nextGrid[idx] = 1;
                    }
                }
            }
        }

        // Меняем сетки местами: nextGrid становится текущей grid
        let temp = grid;
        grid = nextGrid;
        nextGrid = temp;

        countSpan.innerText = activeParticles;
    }
    
    // Оптимизированная отрисовка через Offscreen Canvas
    const offCanvas = document.createElement('canvas');
    const offCtx = offCanvas.getContext('2d');
    
    function render() {
        // Синхронизируем размеры оффскрин-канваса с логической сеткой
        if (offCanvas.width !== cols || offCanvas.height !== rows) {
            offCanvas.width = cols;
            offCanvas.height = rows;
        }

        const imgData = offCtx.createImageData(cols, rows);
        const data = imgData.data;

        // Заполняем пиксели водой
        for (let i = 0; i < grid.length; i++) {
            if (grid[i] === 1) {
                const idx = i * 4;
                data[idx] = WATER_COLOR[0];     // R
                data[idx + 1] = WATER_COLOR[1]; // G
                data[idx + 2] = WATER_COLOR[2]; // B
                data[idx + 3] = 255;            // Alpha
            } else {
                const idx = i * 4;
                data[idx + 3] = 0; // Прозрачный фон
            }
        }

        offCtx.putImageData(imgData, 0, 0);

        // Растягиваем маленькую сетку на весь экран
        ctx.imageSmoothingEnabled = false; 
        ctx.drawImage(offCanvas, 0, 0, canvas.width, canvas.height);
    }

    function loop() {
        update();
        render();
        requestAnimationFrame(loop);
    }

    loop();

</script>
</body>
</html>
