<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Симулятор воды</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
        }
        .controls {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="controls">
        ЛКМ: Налить воду | ПКМ: Убрать воду | Частиц: <span id="count">0</span>/10000
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const countSpan = document.getElementById('count');

        let width, height;
        let particles = [];
        let mouse = { x: 0, y: 0, leftDown: false, rightDown: false };
        
        // Настройки симуляции
        const GRAVITY = 0.3;
        const FRICTION = 0.99;
        const BOUNCE = 0.3;
        const PARTICLE_RADIUS = 3.5;
        const MAX_PARTICLES = 10000;
        const SPAWN_RATE = 5;
        const REMOVE_RADIUS = 40;
        const GRID_SIZE = 20; // Размер ячейки для пространственной сетки

        // Пространственная сетка для оптимизации коллизий
        let grid = {};

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.radius = PARTICLE_RADIUS;
                const shade = 140 + Math.random() * 60;
                this.color = `hsl(200, 85%, ${40 + Math.random() * 20}%)`;
            }

            update() {
                this.vy += GRAVITY;
                this.vx *= FRICTION;
                this.vy *= FRICTION;
                this.x += this.vx;
                this.y += this.vy;

                // Границы
                if (this.y + this.radius > height) {
                    this.y = height - this.radius;
                    this.vy *= -BOUNCE;
                    this.vx += (Math.random() - 0.5) * 0.3;
                } else if (this.y - this.radius < 0) {
                    this.y = this.radius;
                    this.vy *= -BOUNCE;
                }
                
                if (this.x + this.radius > width) {
                    this.x = width - this.radius;
                    this.vx *= -BOUNCE;
                } else if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.vx *= -BOUNCE;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            getGridKey() {
                const gx = Math.floor(this.x / GRID_SIZE);
                const gy = Math.floor(this.y / GRID_SIZE);
                return `${gx},${gy}`;
            }
        }

        function buildGrid() {
            grid = {};
            for (let i = 0; i < particles.length; i++) {
                const key = particles[i].getGridKey();
                if (!grid[key]) grid[key] = [];
                grid[key].push(i);
            }
        }

        function resolveCollisions() {
            buildGrid();
            
            const minDist = PARTICLE_RADIUS * 2;
            const minDistSq = minDist * minDist;

            for (let i = 0; i < particles.length; i++) {
                const p1 = particles[i];
                const gx = Math.floor(p1.x / GRID_SIZE);
                const gy = Math.floor(p1.y / GRID_SIZE);

                // Проверяем соседние ячейки
                for (let dx = -1; dx <= 1; dx++) {
                    for (let dy = -1; dy <= 1; dy++) {
                        const key = `${gx + dx},${gy + dy}`;
                        const cell = grid[key];
                        if (!cell) continue;

                        for (const j of cell) {
                            if (i >= j) continue;
                            
                            const p2 = particles[j];
                            const ddx = p1.x - p2.x;
                            const ddy = p1.y - p2.y;
                            const distSq = ddx * ddx + ddy * ddy;

                            if (distSq < minDistSq && distSq > 0) {
                                const dist = Math.sqrt(distSq);
                                const overlap = minDist - dist;
                                const nx = ddx / dist;
                                const ny = ddy / dist;

                                // Разделяем частицы
                                const force = overlap * 0.5;
                                p1.x += nx * force;
                                p1.y += ny * force;
                                p2.x -= nx * force;
                                p2.y -= ny * force;

                                // Обмен импульсом
                                const dvx = p1.vx - p2.vx;
                                const dvy = p1.vy - p2.vy;
                                const dvn = dvx * nx + dvy * ny;
                                
                                if (dvn > 0) {
                                    const impulse = dvn * 0.5;
                                    p1.vx -= nx * impulse;
                                    p1.vy -= ny * impulse;
                                    p2.vx += nx * impulse;
                                    p2.vy += ny * impulse;
                                }
                            }
                        }
                    }
                }
            }
        }

        canvas.addEventListener('mousedown', e => {
            if (e.button === 0) mouse.leftDown = true;
            if (e.button === 2) mouse.rightDown = true;
            updateMouse(e);
        });
        canvas.addEventListener('mouseup', e => {
            if (e.button === 0) mouse.leftDown = false;
            if (e.button === 2) mouse.rightDown = false;
        });
        canvas.addEventListener('mousemove', updateMouse);
        canvas.addEventListener('contextmenu', e => e.preventDefault());

        function updateMouse(e) {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        }

        function loop() {
            ctx.clearRect(0, 0, width, height);

            // Спавн (ЛКМ)
            if (mouse.leftDown && particles.length < MAX_PARTICLES) {
                for (let i = 0; i < SPAWN_RATE; i++) {
                    if (particles.length >= MAX_PARTICLES) break;
                    const offsetX = (Math.random() - 0.5) * 25;
                    const offsetY = (Math.random() - 0.5) * 25;
                    particles.push(new Particle(mouse.x + offsetX, mouse.y + offsetY));
                }
            }

            // Удаление (ПКМ)
            if (mouse.rightDown) {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    const dx = p.x - mouse.x;
                    const dy = p.y - mouse.y;
                    if (dx*dx + dy*dy < REMOVE_RADIUS * REMOVE_RADIUS) {
                        particles.splice(i, 1);
                    }
                }
            }

            // Физика: несколько подшагов для стабильности
            const substeps = 2;
            for (let s = 0; s < substeps; s++) {
                resolveCollisions();
                for (const p of particles) {
                    p.update();
                }
            }

            // Отрисовка
            for (const p of particles) {
                p.draw();
            }

            countSpan.textContent = particles.length;
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
