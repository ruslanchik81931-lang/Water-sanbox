<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Реалистичная Физика Воды (Grid-Based)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        canvas { display: block; image-rendering: pixelated; }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 8px;
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body>
<div id="ui">
    <h3>Управление:</h3>
    <p>🖱️ <b>ЛКМ</b>: Налить воду</p>
    <p>🖱️ <b>ПКМ</b>: Убрать воду</p>
    <p>💧 Заполнено: <span id="count">0</span>%</p>
</div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: false });
const countSpan = document.getElementById('count');

let width, height;
let cols, rows;
const scale = 6; // Размер клетки (чем меньше, тем детальнее, но тяжелее)

// Типы клеток: 0 - пусто, >0 - уровень воды
let grid = [];
let newGrid = [];

// Параметры
const maxWater = 255; // Максимальное количество воды в клетке
const flowSpeed = 0.8; // Скорость растекания

// Мышь
const mouse = { x: 0, y: 0, leftDown: false, rightDown: false };
const brushSize = 3; // Радиус кисти в клетках

function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
    
    cols = Math.ceil(width / scale);
    rows = Math.ceil(height / scale);
    
    const total = cols * rows;
    grid = new Uint8Array(total);
    newGrid = new Uint8Array(total);
}

window.addEventListener('resize', resize);
resize();

// Управление
canvas.addEventListener('mousedown', e => {
    if (e.button === 0) mouse.leftDown = true;
    if (e.button === 2) mouse.rightDown = true;
});
canvas.addEventListener('mouseup', e => {
    if (e.button === 0) mouse.leftDown = false;
    if (e.button === 2) mouse.rightDown = false;
});
canvas.addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('mousemove', e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

function getIndex(x, y) {
    if (x < 0 || x >= cols || y < 0 || y >= rows) return -1;
    return y * cols + x;
}

function updatePhysics() {
    // Копируем текущее состояние в новый буфер
    newGrid.set(grid);

    let totalWater = 0;

    // Проходим снизу вверх, чтобы вода падала корректно за один кадр
    // Чередование направления прохода по X для симметрии потока
    for (let y = rows - 1; y >= 0; y--) {
        const startX = (y % 2 === 0) ? 0 : cols - 1;
        const endX = (y % 2 === 0) ? cols : -1;
        const stepX = (y % 2 === 0) ? 1 : -1;

        for (let x = startX; x !== endX; x += stepX) {
            const idx = y * cols + x;
            let amount = grid[idx];
            
            if (amount === 0) continue;
            
            totalWater += amount;

            // 1. Попытка двигаться вниз
            const downIdx = getIndex(x, y + 1);
            if (downIdx !== -1) {
                const downAmount = grid[downIdx];
                if (downAmount < maxWater) {
                    const space = maxWater - downAmount;
                    const transfer = Math.min(amount, space, Math.ceil(amount * flowSpeed));
                    
                    newGrid[downIdx] += transfer;
                    newGrid[idx] -= transfer;
                    amount = newGrid[idx];
                }
            }

            // 2. Если внизу занято, растекаемся в стороны и по диагонали
            if (amount > 0) {
                const dirs = [
                    { dx: -1, dy: 1 }, // Вниз-влево
                    { dx: 1, dy: 1 },  // Вниз-вправо
                    { dx: -1, dy: 0 }, // Влево
                    { dx: 1, dy: 0 }   // Вправо
                ];

                // Случайный порядок сторон, чтобы вода не текла только влево
                if (Math.random() > 0.5) {
                    dirs[2].dx = 1; dirs[3].dx = -1;
                }

                for (let d of dirs) {
                    if (amount <= 0) break;
                    
                    const nx = x + d.dx;
                    const ny = y + d.dy;
                    const nIdx = getIndex(nx, ny);
                    
                    if (nIdx !== -1) {
                        const nAmount = newGrid[nIdx];
                        
                        let canFlow = false;
                        if (d.dy === 1) {
                            // Вниз-вбок течет, если есть место
                            if (nAmount < maxWater) canFlow = true;
                        } else {
                            // По горизонтали течет, если сосед пустее
                            if (nAmount < amount) canFlow = true;
                        }

                        if (canFlow) {
                            const space = maxWater - nAmount;
                            const factor = (d.dy === 1) ? 0.8 : 0.4; 
                            const transfer = Math.min(amount, space, Math.ceil(amount * factor));
                            
                            if (transfer > 0) {
                                newGrid[nIdx] += transfer;
                                newGrid[idx] -= transfer;
                                amount = newGrid[idx];
                            }
                        }
                    }
                }
            }
        }
    }

    // Обновляем основной грид
    grid.set(newGrid);
    
    // Статистика
    const maxTotal = cols * rows * maxWater;
    const percent = ((totalWater / maxTotal) * 100).toFixed(2);
    countSpan.innerText = percent;
}

function handleInput() {
    const cx = Math.floor(mouse.x / scale);
    const cy = Math.floor(mouse.y / scale);
    const r = brushSize;

    for (let y = -r; y <= r; y++) {
        for (let x = -r; x <= r; x++) {
            if (x*x + y*y > r*r) continue;
            
            const nx = cx + x;
            const ny = cy + y;
            const idx = getIndex(nx, ny);
            
            if (idx !== -1) {
                if (mouse.leftDown) {
                    grid[idx] = Math.min(maxWater, grid[idx] + 40);
                } else if (mouse.rightDown) {
                    grid[idx] = 0;
                }
            }
        }
    }
}

function render() {
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, width, height);

    for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
            const idx = y * cols + x;
            const val = grid[idx];
            
            if (val > 0) {
                const ratio = val / maxWater;
                const r = Math.floor(20 + ratio * 30);
                const g = Math.floor(100 + ratio * 80);
                const b = 255;
                
                ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                ctx.fillRect(x * scale, y * scale, scale, scale + 0.5);
            }
        }
    }
}

function loop() {
    handleInput();
    updatePhysics();
    render();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
